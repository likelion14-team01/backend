name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle 빌드
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      - name: jar 파일 EC2로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*SNAPSHOT.jar"
          target: /home/ubuntu
          strip_components: 2

      - name: 앱 재시작
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            PID=$(pgrep -x java || true)
            if [ -n "$PID" ]; then
              kill -15 $PID
              sleep 5
            fi
            cd /home/ubuntu
            JAR=$(ls -t *SNAPSHOT.jar | head -n 1)
            nohup java -Duser.timezone=Asia/Seoul -jar "$JAR" > app.log 2>&1 &
            sleep 5
            if pgrep -x java > /dev/null; then
              echo "배포 성공: $JAR"
            else
              echo "앱 시작 실패 — app.log 마지막 50줄:"
              tail -n 50 app.log
              exit 1
            fi
