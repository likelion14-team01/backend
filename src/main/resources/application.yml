spring:
  application:
    name: collab_session
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

cors:
  #  TODO : 실제 배포된 프론트 주소 변경할것
  allowed-origins: http://localhost:3000,http://localhost:5173,https://likelion14-team01.netlify.app/

# 사진 업로드 파일 저장 경로 (프로젝트 루트 기준 상대경로)
file:
  upload-dir: uploads
